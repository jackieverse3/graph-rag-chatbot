services: 
  - type: web
    name: graphmind-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT 
    healthCheckPath: /health 
    envVars:
      - key: PYTHON_VERSION
         value: "3.11.11"
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: MODEL_NAME
        sync: false
      - key: OLLAMA_API_KEY
        sync:false